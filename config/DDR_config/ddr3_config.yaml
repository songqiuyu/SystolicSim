Frontend:
  impl: SystolicFrontEnd # 使用刚才注册的空的 Frontend
  clock_ratio: 1         # 频率与内存比例设为1:1，因为系统主要由SystemC外部时钟推进

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 1

  DRAM:
    impl: DDR3
    org:
      preset: DDR3_8Gb_x8
      channel: 1
      rank: 2
    timing:
      preset: DDR3_1600K 

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: ClosedRowPolicy
      cap: 4
    plugins:

  AddrMapper:
    impl: RoBaRaCoCh
